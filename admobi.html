<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>真珠 · 手機後台</title>
    <link rel="icon" href="https://www.jinzhu.com.tw/favicon.ico">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pine: #004d40;
            --pine-dark: #002e27;
            --pine-light: #00695c;
            --gold: #b89150;
            --gold-light: #d4a85a;
            --ink: #1e293b;
            --stone: #64748b;
            --border: #e2e8f0;
            --paper: #f8fafc;
            --card: #ffffff;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --nav-h: 64px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--paper);
            color: var(--ink);
            overscroll-behavior: none;
        }

        /* ── APP SHELL ── */
        #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

        /* ── TOP BAR ── */
        #top-bar {
            flex-shrink: 0;
            background: var(--pine-dark);
            padding: 12px 16px;
            padding-top: calc(12px + env(safe-area-inset-top, 0px));
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
            z-index: 10;
        }
        #top-bar .logo { display: flex; align-items: center; gap: 10px; }
        #top-bar .logo-text { font-family: 'Noto Serif TC', serif; font-size: 1.1rem; font-weight: 900; color: var(--gold); }
        #top-bar .page-title { font-size: 13px; color: rgba(255,255,255,0.5); font-weight: 700; letter-spacing: 0.05em; }
        #top-bar .kpi-pill {
            display: flex; align-items: center; gap: 6px;
            background: rgba(255,255,255,0.07); border-radius: 999px;
            padding: 5px 12px; font-size: 11px;
        }
        #top-bar .kpi-pill .num { font-family: 'Noto Serif TC', serif; font-weight: 900; color: var(--gold); font-size: 14px; }

        /* ── CONTENT AREA ── */
        #content {
            flex: 1; overflow-y: auto; overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 8px);
        }

        /* ── BOTTOM NAV ── */
        #bottom-nav {
            flex-shrink: 0;
            position: fixed; bottom: 0; left: 0; right: 0;
            height: calc(var(--nav-h) + var(--safe-bottom));
            background: var(--pine-dark);
            display: flex; align-items: flex-start;
            padding-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.08);
            z-index: 100;
        }
        .nav-item {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            gap: 3px; padding: 6px 4px;
            color: rgba(255,255,255,0.35); font-size: 9px; font-weight: 700;
            cursor: pointer; transition: color 0.2s;
            border: none; background: none; letter-spacing: 0.05em;
        }
        .nav-item .nav-icon { font-size: 20px; line-height: 1; }
        .nav-item.active { color: var(--gold); }
        .nav-item.active .nav-icon { filter: drop-shadow(0 0 6px rgba(184,145,80,0.5)); }

        /* ── SECTIONS ── */
        .section { display: none; padding: 12px 14px; }
        .section.active { display: block; }

        /* ── SECTION HEADER ── */
        .sec-head {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 14px;
        }
        .sec-head h2 {
            font-family: 'Noto Serif TC', serif; font-size: 1.1rem; font-weight: 900;
            color: var(--pine); display: flex; align-items: center; gap: 8px;
        }
        .sec-head h2::before { content: ''; display: block; width: 3px; height: 18px; background: var(--gold); border-radius: 2px; }

        /* ── CARDS ── */
        .card {
            background: white; border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            overflow: hidden; margin-bottom: 10px;
        }
        .card-header {
            padding: 14px 16px; display: flex; align-items: center;
            justify-content: space-between; cursor: pointer;
            border-bottom: 1px solid transparent; transition: background 0.2s;
            -webkit-user-select: none; user-select: none;
        }
        .card-header:active { background: #f8fafc; }
        .card.open .card-header { border-bottom-color: var(--border); }
        .card-body { padding: 14px 16px; display: none; }
        .card.open .card-body { display: block; }

        /* ── INPUTS ── */
        .field-label {
            display: block; font-size: 9px; font-weight: 700;
            letter-spacing: 0.2em; text-transform: uppercase;
            color: var(--stone); margin-bottom: 5px;
        }
        .field-input {
            width: 100%; border: 1.5px solid var(--border); border-radius: 10px;
            padding: 10px 12px; font-size: 14px; background: #f8fafc;
            outline: none; transition: border 0.2s;
            font-family: 'Noto Sans TC', sans-serif; color: var(--ink);
            -webkit-appearance: none; appearance: none;
        }
        .field-input:focus { border-color: var(--pine); background: white; }
        .field-select {
            width: 100%; border: 1.5px solid var(--border); border-radius: 10px;
            padding: 10px 12px; font-size: 14px; background: #f8fafc;
            outline: none; font-family: 'Noto Sans TC', sans-serif;
            color: var(--ink); cursor: pointer; -webkit-appearance: none;
        }
        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .field-row.three { grid-template-columns: 1fr 1fr 1fr; }
        .field-group { margin-bottom: 10px; }

        /* ── BUTTONS ── */
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            gap: 6px; padding: 10px 18px; border-radius: 10px;
            font-weight: 700; font-size: 13px; border: none; cursor: pointer;
            transition: all 0.15s; font-family: 'Noto Sans TC', sans-serif;
            -webkit-appearance: none; letter-spacing: 0.03em;
        }
        .btn:active { transform: scale(0.96); opacity: 0.85; }
        .btn-primary { background: var(--pine); color: white; }
        .btn-gold { background: var(--gold); color: white; }
        .btn-ghost { background: white; color: var(--stone); border: 1.5px solid var(--border); }
        .btn-danger { background: #fee2e2; color: #dc2626; }
        .btn-sm { padding: 7px 14px; font-size: 12px; border-radius: 8px; }
        .btn-full { width: 100%; }
        .btn-icon { padding: 8px; border-radius: 8px; font-size: 16px; }

        /* ── STATUS BADGES ── */
        .badge {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 10px; font-weight: 700; padding: 3px 8px;
            border-radius: 999px;
        }
        .badge.pending { background: #fef3c7; color: #d97706; }
        .badge.synced  { background: #d1fae5; color: #059669; }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .status-dot.pending { background: var(--gold); }
        .status-dot.synced  { background: #10b981; }

        /* ── ORDER CARD ── */
        .order-card { background: white; border-radius: 16px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .order-card.done { opacity: 0.55; filter: grayscale(0.4); }
        .order-header { padding: 14px 16px; cursor: pointer; display: flex; align-items: center; gap: 10px; -webkit-user-select: none; user-select: none; }
        .order-header:active { background: #f8fafc; }
        .order-card.open .order-header { border-bottom: 1px solid var(--border); }
        .order-name { font-weight: 900; font-size: 15px; flex: 1; }
        .order-amount { font-family: 'Noto Serif TC', serif; font-size: 15px; font-weight: 900; color: var(--gold); }
        .order-body { display: none; padding: 14px 16px; }
        .order-card.open .order-body { display: block; }
        .order-section { margin-bottom: 16px; }
        .order-sec-label { font-size: 9px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--stone); margin-bottom: 8px; }
        .order-field label { display: block; font-size: 9px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--stone); margin-bottom: 5px; }
        .order-field input, .order-field select { width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 12px; font-size: 14px; background: #f8fafc; outline: none; transition: border 0.2s; font-family: 'Noto Sans TC', sans-serif; color: var(--ink); -webkit-appearance: none; }
        .order-field input:focus, .order-field select:focus { border-color: var(--pine); background: white; }
        .item-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid rgba(0,0,0,0.04); font-size: 13px; }
        .item-row:last-child { border-bottom: none; }
        .item-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }
        .item-name { flex: 1; font-weight: 700; }
        .item-qty { font-weight: 900; color: var(--pine); font-size: 14px; }
        .set-block { border: 1.5px solid rgba(184,145,80,0.3); border-radius: 10px; overflow: hidden; margin-bottom: 8px; }
        .set-block-head { background: rgba(184,145,80,0.08); padding: 7px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(184,145,80,0.15); }
        .set-block-head span { font-weight: 900; font-size: 12px; color: var(--gold); }
        .set-block-body { padding: 4px 12px; }
        .order-actions { display: grid; grid-template-columns: 1fr 1.5fr 44px; gap: 8px; margin-top: 14px; }

        /* ── TOAST ── */
        #toast-wrap {
            position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
            z-index: 9999; display: flex; flex-direction: column; gap: 8px;
            pointer-events: none; width: calc(100vw - 32px); max-width: 360px;
        }
        .toast {
            padding: 12px 16px; border-radius: 12px; font-size: 13px; font-weight: 700;
            color: white; box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            animation: toastIn 0.3s ease both; display: flex; align-items: center; gap: 8px;
        }
        .toast.success { background: var(--pine); }
        .toast.error   { background: #dc2626; }
        .toast.warn    { background: #d97706; }
        .toast.info    { background: #1e40af; }
        .toast.out     { animation: toastOut 0.25s ease forwards; }
        @keyframes toastIn  { from { opacity:0; transform:translateY(-12px); } to { opacity:1; transform:translateY(0); } }
        @keyframes toastOut { from { opacity:1; } to { opacity:0; transform:translateY(-8px); } }

        /* ── CONFIRM ── */
        #confirm-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            z-index: 9998; display: none; align-items: flex-end; justify-content: center;
            padding: 16px; backdrop-filter: blur(4px);
        }
        #confirm-overlay.visible { display: flex; }
        #confirm-box {
            background: white; border-radius: 20px; padding: 24px 20px;
            width: 100%; max-width: 420px;
            padding-bottom: calc(24px + var(--safe-bottom));
            animation: slideUp 0.25s ease both;
        }
        @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        #confirm-icon { font-size: 1.8rem; margin-bottom: 10px; }
        #confirm-title { font-size: 15px; font-weight: 900; color: var(--ink); margin-bottom: 6px; }
        #confirm-msg { font-size: 13px; color: var(--stone); line-height: 1.7; margin-bottom: 20px; }
        .confirm-actions { display: flex; gap: 10px; }
        .confirm-cancel { flex: 1; padding: 13px; border-radius: 12px; border: 1.5px solid var(--border); background: white; color: var(--stone); font-weight: 700; font-size: 14px; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; }
        .confirm-ok { flex: 1.5; padding: 13px; border-radius: 12px; border: none; font-weight: 700; font-size: 14px; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; }
        .confirm-ok.danger { background: #dc2626; color: white; }
        .confirm-ok.primary { background: var(--pine); color: white; }

        /* ── LOGIN ── */
        #login-screen {
            position: fixed; inset: 0; z-index: 9999;
            background: linear-gradient(160deg, var(--pine-dark) 0%, var(--pine) 60%, var(--pine-light) 100%);
            display: flex; align-items: center; justify-content: center; padding: 24px;
        }
        #login-screen.hidden { display: none; }
        .login-box { width: 100%; max-width: 360px; }
        .login-logo { text-align: center; margin-bottom: 36px; }
        .login-logo img { height: 48px; filter: brightness(0) invert(1); }
        .login-logo p { font-family: 'Noto Serif TC', serif; font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 0.3em; margin-top: 10px; text-transform: uppercase; }
        .login-field { margin-bottom: 16px; }
        .login-label { display: block; font-size: 9px; font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 8px; }
        .login-input { width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; color: white; font-size: 16px; outline: none; transition: border 0.2s; font-family: 'Noto Sans TC', sans-serif; }
        .login-input::placeholder { color: rgba(255,255,255,0.3); }
        .login-input:focus { border-color: var(--gold); }
        #login-error { display: none; color: #fca5a5; font-size: 12px; font-weight: 700; text-align: center; margin-bottom: 12px; background: rgba(220,38,38,0.2); padding: 10px; border-radius: 10px; }
        .login-btn { width: 100%; padding: 16px; background: var(--gold); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; margin-top: 8px; }

        /* ── FILTER PILLS ── */
        .pill-bar { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 12px; }
        .pill-bar::-webkit-scrollbar { display: none; }
        .pill { flex-shrink: 0; padding: 6px 14px; border-radius: 999px; font-size: 12px; font-weight: 700; border: 1.5px solid var(--border); background: white; color: var(--stone); cursor: pointer; transition: all 0.15s; }
        .pill.on { background: var(--pine); color: white; border-color: var(--pine); }
        .pill.gold { background: var(--gold); color: white; border-color: var(--gold); }

        /* ── SEARCH BAR ── */
        .search-wrap { position: relative; margin-bottom: 12px; }
        .search-wrap input { width: 100%; padding: 10px 40px 10px 14px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 14px; background: white; outline: none; font-family: 'Noto Sans TC', sans-serif; color: var(--ink); }
        .search-wrap input:focus { border-color: var(--pine); }
        .search-icon { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--stone); font-size: 16px; pointer-events: none; }

        /* ── MENU GRID ── */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .menu-card { background: white; border-radius: 14px; border: 1px solid var(--border); overflow: hidden; }
        .menu-card-img { height: 90px; background: #f8fafc; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .menu-card-img img { max-height: 100%; max-width: 100%; object-fit: contain; }
        .menu-card-body { padding: 10px; }
        .menu-card-name { font-weight: 700; font-size: 12px; color: var(--ink); margin-bottom: 4px; line-height: 1.3; }
        .menu-card-price { font-weight: 900; font-size: 13px; color: var(--gold); }
        .menu-card-actions { display: flex; gap: 6px; margin-top: 8px; }

        /* ── KPI STRIP ── */
        .kpi-strip { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 12px; }
        .kpi-strip::-webkit-scrollbar { display: none; }
        .kpi-box { flex-shrink: 0; background: white; border-radius: 14px; border: 1px solid var(--border); padding: 12px 14px; min-width: 90px; }
        .kpi-box .kv { font-family: 'Noto Serif TC', serif; font-size: 1.5rem; font-weight: 900; color: var(--pine); }
        .kpi-box .kl { font-size: 10px; font-weight: 700; color: var(--stone); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; }

        /* ── EMPTY STATE ── */
        .empty-state { text-align: center; padding: 48px 24px; color: var(--stone); }
        .empty-state .empty-icon { font-size: 2.5rem; opacity: 0.2; margin-bottom: 12px; }
        .empty-state p { font-size: 13px; font-weight: 700; }

        /* ── MODAL SHEET ── */
        .sheet-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            z-index: 500; display: none; align-items: flex-end;
            backdrop-filter: blur(4px);
        }
        .sheet-overlay.visible { display: flex; }
        .sheet {
            background: white; border-radius: 20px 20px 0 0;
            width: 100%; max-height: 90vh; overflow-y: auto;
            padding: 20px 16px;
            padding-bottom: calc(20px + var(--safe-bottom));
            animation: sheetUp 0.3s ease both;
        }
        @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
        .sheet-title { font-family: 'Noto Serif TC', serif; font-size: 1.1rem; font-weight: 900; color: var(--pine); margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }

        /* ── REPORT TABS ── */
        .tab-bar { display: flex; background: #f1f5f9; border-radius: 12px; padding: 3px; gap: 2px; margin-bottom: 12px; }
        .tab-btn { flex: 1; padding: 8px 4px; border-radius: 10px; font-size: 11px; font-weight: 700; border: none; background: transparent; color: #94a3b8; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
        .tab-btn.on { background: white; color: var(--pine); box-shadow: 0 1px 6px rgba(0,0,0,0.1); }

        /* ── TOGGLE ── */
        .toggle-wrap { display: flex; align-items: center; gap: 8px; }
        .toggle-bg { width: 44px; height: 24px; border-radius: 999px; background: #94a3b8; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; padding: 2px; flex-shrink: 0; }
        .toggle-bg.on { background: var(--pine); }
        .toggle-dot { width: 20px; height: 20px; border-radius: 50%; background: white; transition: transform 0.2s; }
        .toggle-bg.on .toggle-dot { transform: translateX(20px); }

        /* ── PROGRESS BAR ── */
        .prog-bar { height: 5px; background: #e2e8f0; border-radius: 999px; overflow: hidden; }
        .prog-fill { height: 100%; border-radius: 999px; transition: width 0.4s; }

        /* ── NOTIFY TARGET CARD ── */
        .target-card { background: white; border-radius: 14px; border: 1px solid var(--border); padding: 14px; margin-bottom: 8px; }
        .target-avatar { width: 42px; height: 42px; border-radius: 12px; background: linear-gradient(135deg, var(--pine), var(--pine-light)); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 900; color: white; overflow: hidden; flex-shrink: 0; }

        /* ── BOT CARD ── */
        .bot-card { background: white; border-radius: 14px; border: 1px solid var(--border); padding: 14px; margin-bottom: 8px; }
        .bot-card.is-default { border-color: var(--gold); background: #fffbeb; }

        /* ── ANNOUNCE CARD ── */
        .ann-card { background: white; border-radius: 14px; border: 1px solid var(--border); padding: 14px; margin-bottom: 8px; }
        .ann-card.active { border-left: 3px solid #10b981; }

        /* ── PHOTO GRID ── */
        .photo-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .photo-thumb { aspect-ratio: 1; border-radius: 10px; overflow: hidden; position: relative; cursor: pointer; }
        .photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .photo-thumb .photo-sel { position: absolute; top: 5px; left: 5px; }
        .photo-thumb .old-badge { position: absolute; top: 5px; right: 5px; background: rgba(220,38,38,0.8); color: white; font-size: 9px; font-weight: 700; padding: 2px 5px; border-radius: 4px; }

        /* ── LOADING ── */
        .loading { display: flex; align-items: center; justify-content: center; padding: 40px; }
        .spin { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--pine); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── MISC ── */
        .divider { height: 1px; background: var(--border); margin: 12px 0; }
        .text-gold { color: var(--gold); }
        .text-pine { color: var(--pine); }
        .font-serif { font-family: 'Noto Serif TC', serif; }
        .font-mono { font-family: monospace; }
        textarea.field-input { resize: none; }
        .note-block { background: #f0fdf4; border-left: 3px solid var(--pine); border-radius: 8px; padding: 8px 12px; font-size: 12px; font-weight: 700; color: var(--pine); margin-top: 8px; }
        .admin-note-block { background: #fffbeb; border-left: 3px solid var(--gold); border-radius: 8px; padding: 8px 12px; font-size: 12px; }

        /* ── PULL TO REFRESH ── */
        .ptr-hint { text-align: center; font-size: 11px; color: var(--stone); padding: 8px; display: none; }

        /* ── CALENDAR ── */
        .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 1px; background: var(--border); border-radius: 14px; overflow: hidden; }
        .cal-day-head { background: #f8fafc; text-align: center; font-size: 10px; font-weight: 700; padding: 6px 0; color: var(--stone); }
        .cal-day-head.sun { color: #ef4444; }

<script>
// ── HELPERS ──
function parseItemDisplay(rawName){
    const qM=rawName.match(/^[^(]* x(\d+)/);
    const qty=qM?parseInt(qM[1]):1;
    const topQtyRemoved=rawName.replace(/^([^(]+?) x\d+(\s*\()/,'$1$2').replace(/^([^(]+?) x\d+$/,'$1');
    const pI=topQtyRemoved.indexOf(' (');
    const inner=pI>-1?topQtyRemoved.slice(pI+2,-1):null;
    const isSet=!!(inner&&inner.includes('、'));
    const namePart=pI>-1?topQtyRemoved.slice(0,pI):topQtyRemoved;
    const flvM=namePart.match(/\[([^\]]+)\]/);
    const flv=flvM?flvM[1]:'';
    const clean=rawName.replace(/\s*\[.*?\]/g,'').replace(/ x\d+/g,'').trim();
    const brand=isSet?clean.replace(/ \(.*$/,'').trim():null;
    return{qty,flv,clean,inner,isSet,brand};
}
function parseSetSubs(innerRaw){
    if(!innerRaw) return[];
    const map={};
    innerRaw.split('、').forEach(raw=>{
        const{clean,flv,qty}=parseItemDisplay(raw.trim());
        if(!clean)return;
        const key=flv?clean+'｜'+flv:clean;
        if(!map[key])map[key]={name:clean,flv,qty:0};
        map[key].qty+=qty||1;
    });
    return Object.values(map);
}

async function renderCal(){
    const mn=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    document.getElementById('cal-label').textContent=`${calYear} 年 ${mn[calMonth]}`;
    const{data}=await _s.from('orders').select('*');
    const all=data||[];
    const map={};
    all.filter(o=>o.booking_date).forEach(o=>{
        const tw=new Date(new Date(o.booking_date).getTime()+8*3600000);
        const k=`${tw.getUTCFullYear()}-${String(tw.getUTCMonth()+1).padStart(2,'0')}-${String(tw.getUTCDate()).padStart(2,'0')}`;
        if(!map[k])map[k]=[];map[k].push(o);
    });
    // No date bar
    const noDate=all.filter(o=>!o.booking_date);
    const bar=document.getElementById('no-date-bar');
    if(noDate.length){
        bar.style.display='block';
        document.getElementById('no-date-list').innerHTML=noDate.map(o=>`<span style="background:white;border:1px solid #fde68a;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer" onclick="showOrderSheet('${o.id}')">${o.customer_name}</span>`).join('');
    } else bar.style.display='none';
    const firstDay=new Date(calYear,calMonth,1).getDay();
    const days=new Date(calYear,calMonth+1,0).getDate();
    const today=new Date();
    const todayStr=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
    let html='';
    for(let i=0;i<firstDay;i++) html+=`<div class="cal-cell empty"></div>`;
    for(let d=1;d<=days;d++){
        const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const isToday=ds===todayStr;
        const dow=(firstDay+d-1)%7;
        const orders=map[ds]||[];
        const numCls=!isToday&&dow===0?'sun':!isToday&&dow===6?'sat':'';
        html+=`<div class="cal-cell ${isToday?'today':''}" onclick="openCalDay('${ds}')">
            <div class="day-num ${isToday?'':numCls}">${d}</div>
            ${orders.length?`<div class="order-count">${orders.length}</div>`:''}
            <div class="order-dots">
                ${orders.slice(0,2).map(o=>{const tw=new Date(new Date(o.booking_date).getTime()+8*3600000);const hh=String(tw.getUTCHours()).padStart(2,'0')+':'+String(tw.getUTCMinutes()).padStart(2,'0');return`<div class="order-dot-item">${hh} ${o.customer_name}</div>`;}).join('')}
                ${orders.length>2?`<div style="font-size:8px;color:var(--stone);font-weight:700">+${orders.length-2}</div>`:''}
            </div>
        </div>`;
    }
    document.getElementById('cal-cells').innerHTML=html;
}

let rptData=null;

function rptInit(){

function rptSetPreset(type,el){
    curRptPreset=type;
    document.querySelectorAll('#sec-report .pill-bar .pill').forEach(p=>p.classList.remove('on'));
    el.classList.add('on');
    const now=new Date(),today=now.toISOString().split('T')[0];
    const sd=document.getElementById('r-s-date'),ed=document.getElementById('r-e-date');
    if(type==='today'){sd.value=ed.value=today;}
    else if(type==='week'){const mon=new Date(now);mon.setDate(now.getDate()-((now.getDay()+6)%7));sd.value=mon.toISOString().split('T')[0];ed.value=today;}
    else if(type==='month'){sd.value=new Date(now.getFullYear(),now.getMonth(),1).toISOString().split('T')[0];ed.value=new Date(now.getFullYear(),now.getMonth()+1,0).toISOString().split('T')[0];}

function rptTab(name,el){

async function fetchReport(){
    const sd=document.getElementById('r-s-date').value,ed=document.getElementById('r-e-date').value;
    if(!sd||!ed){toast('請選擇日期','warn');return;}
    const{data:orders}=await _s.from('orders').select('*').gte('booking_date',`${sd}T00:00:00+08:00`).lte('booking_date',`${ed}T23:59:59+08:00`).order('booking_date',{ascending:true});
    const o=orders||[];
    const dishCount={},setCount={},setDetail={};
    let totalAdult=0,totalKid=0,totalChild=0,totalRev=0;
    o.forEach(ord=>{
        totalAdult+=(ord.adult_count||0);totalKid+=(ord.kid_count||0);totalChild+=(ord.child_count||0);totalRev+=(ord.total_price||0);
        (ord.order_content||[]).forEach(item=>{
            const{qty,flv,clean,inner,isSet,brand}=parseItemDisplay(item.name);
            if(isSet){
                setCount[brand]=(setCount[brand]||0)+qty;
                if(!setDetail[brand])setDetail[brand]={};
                parseSetSubs(inner).forEach(({name,flv:sf,qty:sq})=>{
                    const dn=sf?`${name} [${sf}]`:name;
                    dishCount[`${brand}／${dn}`]=(dishCount[`${brand}／${dn}`]||0)+qty*sq;
                    setDetail[brand][dn]=(setDetail[brand][dn]||0)+qty*sq;
                });
            } else {dishCount[clean]=(dishCount[clean]||0)+qty;}
        });
    });
    rptData={orders:o,dishCount,setCount,setDetail,totalAdult,totalKid,totalChild,totalRev};
    // KPI Strip
    document.getElementById('report-kpis').innerHTML=[
        {l:'訂單',v:o.length,u:'筆',c:'var(--pine)'},
        {l:'大人',v:totalAdult,u:'',c:'var(--gold)'},
        {l:'小孩',v:totalKid,u:'',c:'var(--gold)'},
        {l:'兒童',v:totalChild,u:'',c:'var(--gold)'},
        {l:'總人數',v:totalAdult+totalKid+totalChild,u:'位',c:'#3b82f6'},
        {l:'預估營收',v:'$'+totalRev.toLocaleString(),u:'',c:'#f43f5e'},
    ].map(k=>`<div class="kpi-box"><div class="kv" style="color:${k.c}">${k.v}</div><div class="kl">${k.l}${k.u?'·'+k.u:''}</div></div>`).join('');
    // Prepare table
    const sorted=Object.entries(dishCount).sort((a,b)=>b[1]-a[1]);
    const maxQ=sorted[0]?.[1]||1;
    document.getElementById('rpt-prepare').innerHTML=`<div class="card"><div style="padding:12px 14px;background:#1e293b;display:flex;justify-content:space-between;align-items:center"><span style="color:white;font-weight:700;font-size:13px">🍳 備料總表</span><span style="background:#475569;color:white;font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px">${sorted.length} 項</span></div><div style="overflow-y:auto;max-height:50vh">${sorted.map(([k,count],i)=>{const isSet=k.includes('／');const[sn,kn]=isSet?k.split('／'):[null,k];const pct=Math.round(count/maxQ*100);return`<div style="padding:10px 14px;border-bottom:1px solid #f8fafc;display:flex;align-items:center;gap:10px"><span style="font-size:11px;font-weight:700;color:#94a3b8;width:20px">${i+1}</span><div style="flex:1"><div style="font-size:13px;font-weight:700">${isSet?`<span style="font-size:10px;color:var(--gold);background:rgba(184,145,80,.1);padding:1px 5px;border-radius:4px;margin-right:4px">${sn}</span>${kn}`:k}</div><div class="prog-bar" style="margin-top:4px"><div class="prog-fill" style="width:${pct}%;background:${isSet?'var(--gold)':'var(--pine)'}"></div></div></div><div style="font-family:'Noto Serif TC',serif;font-size:18px;font-weight:900;color:var(--pine)">${count}</div></div>`;}).join('')||`<div class="empty-state"><p>查無資料</p></div>`}</div></div>`;
    // Set menu
    document.getElementById('rpt-setmenu').innerHTML=Object.entries(setCount).length===0
        ?`<div class="empty-state"><p>查無套餐訂單</p></div>`
        :Object.entries(setCount).sort((a,b)=>b[1]-a[1]).map(([name,count])=>{
            const subs=setDetail[name]||{};
            return`<div class="card" style="margin-bottom:8px"><div style="padding:10px 14px;background:rgba(184,145,80,.08);border-bottom:1px solid rgba(184,145,80,.2);display:flex;justify-content:space-between"><span style="font-weight:900;color:var(--pine)">${name}</span><span style="font-family:'Noto Serif TC',serif;font-size:18px;font-weight:900;color:var(--gold)">${count} 套</span></div><div style="padding:8px 14px">${Object.entries(subs).map(([sn,sc])=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f8fafc"><span style="font-size:12px;flex:1;font-weight:600">${sn}</span><span style="font-weight:900;color:var(--pine)">${sc} 份</span></div>`).join('')}</div></div>`;
        }).join('');
    // Orders
    document.getElementById('rpt-orders').innerHTML=o.length===0
        ?`<div class="empty-state"><p>查無訂單</p></div>`
        :o.map((ord,idx)=>{
            const tw=ord.booking_date?new Date(new Date(ord.booking_date).getTime()+8*3600000):null;
            const hhmm=tw?`${String(tw.getUTCHours()).padStart(2,'0')}:${String(tw.getUTCMinutes()).padStart(2,'0')}`:'—';
            const synced=ord.status==='synced';
            return`<div class="card" style="margin-bottom:8px;padding:12px 14px"><div style="display:flex;align-items:center;gap:8px"><div class="status-dot ${synced?'synced':'pending'}"></div><div style="font-weight:900;font-size:14px;flex:1">${ord.customer_name}</div><div style="font-weight:900;color:var(--gold)">${hhmm}</div></div><div style="font-size:12px;color:var(--stone);margin-top:4px">${ord.phone||'—'} · $${ord.total_price}</div></div>`;
        }).join('');
}

async function saveBot(){
    const id=document.getElementById('bs-id').value;
    const name=document.getElementById('bs-name').value.trim();
    const token=document.getElementById('bs-token').value.trim();
    const limit=parseInt(document.getElementById('bs-limit').value)||200;
    if(!name){toast('請填寫名稱','warn');return;}

    if(token)payload.token=token;

        const{count}=await _s.from('line_bots').select('*',{count:'exact',head:true});

    // Hour options
    const hs=document.getElementById('sum-hour');
    if(!hs.options.length)for(let h=6;h<=22;h++)hs.add(new Option(String(h).padStart(2,'0'),h));
    hs.value=data.notify_hour??10;
    document.getElementById('sum-min').value=data.notify_minute??30;
    const tog=document.getElementById('sum-toggle');
    const lbl=document.getElementById('sum-toggle-lbl');
    if(data.enabled){tog.classList.add('on');lbl.textContent='啟用中';}
    else{tog.classList.remove('on');lbl.textContent='已停用';}
}
async function toggleSummary(){
    const tog=document.getElementById('sum-toggle');
    const lbl=document.getElementById('sum-toggle-lbl');
    const enabled=!tog.classList.contains('on');
    tog.classList.toggle('on',enabled);
    lbl.textContent=enabled?'啟用中':'已停用';
    await _s.from('daily_summary_settings').upsert({id:1,enabled,updated_at:new Date().toISOString()});
    saveSummary();
}
async function saveSummary(){
    const hour=parseInt(document.getElementById('sum-hour').value);
    const min=parseInt(document.getElementById('sum-min').value);
    const enabled=document.getElementById('sum-toggle').classList.contains('on');
    await _s.from('daily_summary_settings').upsert({id:1,enabled,notify_hour:hour,notify_minute:min,updated_at:new Date().toISOString()});
    toast(enabled?`每日彙整設為 ${String(hour).padStart(2,'0')}:${String(min).padStart(2,'0')}`:'已停用','success',2000);
}
async function testSummary(){
    toast('📤 發送中…','info',2000);
    try{
        const{error}=await _s.functions.invoke('jin-zhu-notify',{body:{action:'daily-summary'}});
        if(error)throw error;
        toast('✓ 已發送，請查看 LINE','success',3000);
    }catch(e){toast('發送失敗：'+(e?.message||e),'error');}
}

// ── ANNOUNCEMENTS ──
async function loadAnnouncements(){
    const{data}=await _s.from('announcements').select('*').order('created_at',{ascending:false});
    const el=document.getElementById('ann-list');
    if(!data?.length){el.innerHTML=`<p style="font-size:12px;color:var(--stone);padding:8px 0">尚無公告</p>`;return;}
    el.innerHTML=data.map(a=>`<div class="ann-card ${a.is_active?'active':''}">
        <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:8px">
            <div style="flex:1">
                <div style="font-weight:700;font-size:13px;color:var(--pine)">${a.title}</div>
                <div style="font-size:12px;color:var(--stone);margin-top:4px;line-height:1.5">${(a.content||'').slice(0,80)}${a.content?.length>80?'…':''}</div>
            </div>
            <span style="font-size:9px;font-weight:700;padding:2px 8px;border-radius:8px;flex-shrink:0;${a.is_active?'background:#d1fae5;color:#059669':'background:#f1f5f9;color:#94a3b8'}">${a.is_active?'啟用':'停用'}</span>
        </div>
        <div style="display:flex;gap:6px">
            <button class="btn btn-ghost btn-sm" style="flex:1;font-size:11px" onclick="editAnn(${a.id})">編輯</button>
            <button class="btn btn-sm ${a.is_active?'btn-ghost':'btn-primary'}" style="flex:1;font-size:11px" onclick="toggleAnn(${a.id},${a.is_active})">${a.is_active?'停用':'啟用'}</button>
            <button class="btn btn-danger btn-sm" style="font-size:11px;padding:7px 10px" onclick="deleteAnn(${a.id})">🗑</button>
        </div>
    </div>`).join('');
}
function openAnnSheet(isEdit){
    if(!isEdit){
        document.getElementById('as-id').value='';
        document.getElementById('as-title').value='';
        document.getElementById('as-content').value='';
        document.getElementById('as-active').checked=true;
        document.getElementById('ann-sheet-title').textContent='新增公告';
    }
    openSheet('ann-sheet');
}
async function editAnn(id){
    const{data}=await _s.from('announcements').select('*').eq('id',id).single();
    if(!data)return;
    document.getElementById('as-id').value=data.id;
    document.getElementById('as-title').value=data.title;
    document.getElementById('as-content').value=data.content||'';
    document.getElementById('as-active').checked=data.is_active;
    document.getElementById('ann-sheet-title').textContent='編輯公告';
    openSheet('ann-sheet');
}
async function saveAnn(){
    const id=document.getElementById('as-id').value;
    const title=document.getElementById('as-title').value.trim();
    if(!title){toast('請填寫標題','warn');return;}
    const payload={title,content:document.getElementById('as-content').value.trim(),is_active:document.getElementById('as-active').checked};
    if(id) await _s.from('announcements').update(payload).eq('id',id);
    else await _s.from('announcements').insert([payload]);
    closeSheet('ann-sheet');loadAnnouncements();toast('公告已儲存');
}
async function toggleAnn(id,current){await _s.from('announcements').update({is_active:!current}).eq('id',id);loadAnnouncements();}
async function deleteAnn(id){
    const ok=await confirm2({icon:'📢',title:'刪除公告',msg:'確定刪除？',okText:'刪除',danger:true});
    if(!ok)return;
    await _s.from('announcements').delete().eq('id',id);loadAnnouncements();toast('已刪除');
}

// ── PHOTOS ──
let allPhotos=[];
async function loadPhotos(){
    const{data}=await _s.from('customer_photos').select('*').order('created_at',{ascending:false});
    allPhotos=data||[];
    filterPhotos();
}
function filterPhotos(){
    const kw=(document.getElementById('photo-search').value||'').toLowerCase();
    const filtered=allPhotos.filter(p=>!kw||(p.customer_name||'').toLowerCase().includes(kw)||(p.phone||'').toLowerCase().includes(kw)||(p.note||'').toLowerCase().includes(kw));
    document.getElementById('photo-count').textContent=`共 ${filtered.length} 張`;
    const grid=document.getElementById('photo-grid-mobi');
    if(!filtered.length){grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:24px;color:var(--stone);font-size:12px;font-weight:700">尚無照片</div>`;return;}
    const daysAgo=d=>{const n=Math.floor((Date.now()-new Date(d).getTime())/86400000);return n===0?'今天':`${n}天前`;};
    grid.innerHTML=filtered.map(p=>{
        const isOld=(Date.now()-new Date(p.created_at).getTime())>7*86400000;
        return`<div class="photo-thumb" onclick="previewFullPhoto('${p.photo_url}')">
            <img src="${p.photo_url}" alt="${p.customer_name||''}" loading="lazy">
            ${isOld?`<div class="old-badge">逾期</div>`:''}
            <div style="position:absolute;bottom:0;left:0;right:0;padding:4px 6px;background:linear-gradient(transparent,rgba(0,0,0,0.6));border-radius:0 0 10px 10px">
                <div style="font-size:9px;font-weight:700;color:white;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.customer_name||'—'}</div>
                <div style="font-size:8px;color:rgba(255,255,255,0.7)">${daysAgo(p.created_at)}</div>
            </div>
            <button onclick="event.stopPropagation();deletePhotoMobi('${p.id}','${p.storage_path||''}')" style="position:absolute;top:5px;right:5px;background:rgba(220,38,38,0.8);color:white;border:none;border-radius:6px;width:22px;height:22px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center">✕</button>
        </div>`;
    }).join('');
}
function previewFullPhoto(url){
    const ov=document.createElement('div');
    ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;cursor:pointer';
    ov.innerHTML=`<img src="${url}" style="max-width:100%;max-height:100%;border-radius:12px;object-fit:contain">`;
    ov.onclick=()=>document.body.removeChild(ov);
    document.body.appendChild(ov);
}
async function autoDeletePhotos(){
    const cutoff=new Date(Date.now()-7*86400000).toISOString();
    const old=allPhotos.filter(p=>p.created_at<cutoff);
    if(!old.length){toast('沒有逾期照片','info');return;}
    const ok=await confirm2({icon:'🗑',title:'刪除逾期照片',msg:`找到 ${old.length} 張 7 天前的照片，確定刪除？`,okText:'全部刪除',danger:true});
    if(!ok)return;
    const paths=old.map(p=>p.storage_path).filter(Boolean);
    if(paths.length)await _s.storage.from('assets').remove(paths);
    await _s.from('customer_photos').delete().in('id',old.map(p=>p.id));
    loadPhotos();toast(`已刪除 ${old.length} 張`);
}
async function deletePhotoMobi(id,storagePath){
    const ok=await confirm2({icon:'📸',title:'刪除照片',msg:'確定刪除？',okText:'刪除',danger:true});
    if(!ok)return;
    if(storagePath)await _s.storage.from('assets').remove([storagePath]);
    await _s.from('customer_photos').delete().eq('id',id);
    loadPhotos();toast('已刪除');
}

// Photo upload
let uploadPhotoFile=null;
function openPhotoUpload(){
    uploadPhotoFile=null;
    document.getElementById('pu-preview').style.display='none';
    document.getElementById('pu-placeholder').style.display='block';
    document.getElementById('pu-file').value='';
    document.getElementById('pu-name').value='';
    document.getElementById('pu-phone').value='';
    document.getElementById('pu-note').value='';
    document.getElementById('pu-btn').textContent='確認上傳';
    openSheet('photo-upload-sheet');
}
function previewPhoto(input){
    const file=input.files[0];if(!file)return;
    uploadPhotoFile=file;
    const reader=new FileReader();
    reader.onload=e=>{
        document.getElementById('pu-preview-img').src=e.target.result;
        document.getElementById('pu-preview').style.display='block';
        document.getElementById('pu-placeholder').style.display='none';
    };
    reader.readAsDataURL(file);
}
async function doUploadPhoto(){
    if(!uploadPhotoFile){toast('請先選擇照片','warn');return;}
    const btn=document.getElementById('pu-btn');btn.textContent='上傳中…';
    const ext=uploadPhotoFile.name.split('.').pop().toLowerCase();
    const path=`photos/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
    const{error:upErr}=await _s.storage.from('assets').upload(path,uploadPhotoFile,{contentType:uploadPhotoFile.type,upsert:false});
    if(upErr){toast('上傳失敗','error');btn.textContent='確認上傳';return;}
    const{data:urlData}=_s.storage.from('assets').getPublicUrl(path);
    await _s.from('customer_photos').insert([{customer_name:document.getElementById('pu-name').value.trim()||null,phone:document.getElementById('pu-phone').value.trim()||null,note:document.getElementById('pu-note').value.trim()||null,photo_url:urlData.publicUrl}]);
    btn.textContent='✓ 完成！';
    setTimeout(()=>{closeSheet('photo-upload-sheet');loadPhotos();toast('照片上傳成功 📸');},800);
}

// ── INIT CHECK ──
(async()=>{
    const{data:{session}}=await _s.auth.getSession();
    if(session){
        document.getElementById('login-screen').classList.add('hidden');
        initApp();
    }
})();
</script>
